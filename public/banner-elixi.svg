<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <defs>
    <linearGradient id="bg-elixi" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0f05;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#2a1810;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a0a00;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent-elixi" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e67e22;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#1a0f05;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="480" fill="url(#bg-elixi)" rx="24"/>
  <!-- Decorative elements -->
  <circle cx="600" cy="120" r="180" fill="#e67e22" opacity="0.04"/>
  <circle cx="200" cy="380" r="140" fill="#e67e22" opacity="0.03"/>
  <circle cx="680" cy="400" r="100" fill="#f39c12" opacity="0.03"/>
  <!-- X pattern -->
  <line x1="300" y1="80" x2="500" y2="280" stroke="#e67e22" stroke-width="3" opacity="0.08"/>
  <line x1="500" y1="80" x2="300" y2="280" stroke="#e67e22" stroke-width="3" opacity="0.08"/>
  <!-- Decorative lines -->
  <line x1="50" y1="380" x2="750" y2="380" stroke="#e67e22" stroke-width="0.5" opacity="0.15"/>
  <line x1="50" y1="100" x2="750" y2="100" stroke="#e67e22" stroke-width="0.5" opacity="0.1"/>
  <!-- Logo text -->
  <text x="400" y="210" font-family="'Inter', 'Helvetica', sans-serif" font-size="56" fill="#ffffff" text-anchor="middle" letter-spacing="4" font-weight="800">Elixi.</text>
  <!-- Subtitle -->
  <text x="400" y="260" font-family="'Inter', 'Helvetica', sans-serif" font-size="13" fill="#e67e22" text-anchor="middle" letter-spacing="4" text-transform="uppercase">VENTURE STUDIO &amp; ADVISORY</text>
  <text x="400" y="290" font-family="'Inter', 'Helvetica', sans-serif" font-size="11" fill="#d4956b" text-anchor="middle" letter-spacing="2" opacity="0.7">Government-Licensed Korea GTM Accelerator</text>
  <!-- Stats -->
  <text x="280" y="370" font-family="'Inter', 'Helvetica', sans-serif" font-size="28" fill="#e67e22" text-anchor="middle" font-weight="700">900+</text>
  <text x="280" y="392" font-family="'Inter', 'Helvetica', sans-serif" font-size="10" fill="#d4956b" text-anchor="middle" letter-spacing="1" opacity="0.7">STRATEGIES</text>
  <text x="400" y="370" font-family="'Inter', 'Helvetica', sans-serif" font-size="28" fill="#e67e22" text-anchor="middle" font-weight="700">200+</text>
  <text x="400" y="392" font-family="'Inter', 'Helvetica', sans-serif" font-size="10" fill="#d4956b" text-anchor="middle" letter-spacing="1" opacity="0.7">MANDATES</text>
  <text x="520" y="370" font-family="'Inter', 'Helvetica', sans-serif" font-size="28" fill="#e67e22" text-anchor="middle" font-weight="700">50+</text>
  <text x="520" y="392" font-family="'Inter', 'Helvetica', sans-serif" font-size="10" fill="#d4956b" text-anchor="middle" letter-spacing="1" opacity="0.7">PARTNERS</text>
  <!-- Divider dots -->
  <circle cx="340" cy="375" r="2" fill="#e67e22" opacity="0.3"/>
  <circle cx="460" cy="375" r="2" fill="#e67e22" opacity="0.3"/>
</svg>