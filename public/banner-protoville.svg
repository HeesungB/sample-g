<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <defs>
    <linearGradient id="bg-proto" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1f0a;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#1B2F1B;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d260d;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent-proto" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2d8a4e;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#1B2F1B;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow-proto">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="480" fill="url(#bg-proto)" rx="24"/>
  <!-- Decorative circles -->
  <circle cx="650" cy="100" r="200" fill="#2d8a4e" opacity="0.06"/>
  <circle cx="150" cy="400" r="150" fill="#2d8a4e" opacity="0.05"/>
  <circle cx="700" cy="380" r="120" fill="#3da564" opacity="0.04"/>
  <!-- Decorative lines -->
  <line x1="50" y1="380" x2="750" y2="380" stroke="#2d8a4e" stroke-width="0.5" opacity="0.2"/>
  <line x1="50" y1="100" x2="750" y2="100" stroke="#2d8a4e" stroke-width="0.5" opacity="0.15"/>
  <!-- Grid pattern -->
  <rect x="560" y="60" width="180" height="180" rx="12" fill="none" stroke="#2d8a4e" stroke-width="0.8" opacity="0.15"/>
  <rect x="580" y="80" width="140" height="140" rx="8" fill="none" stroke="#2d8a4e" stroke-width="0.5" opacity="0.1"/>
  <!-- Logo area -->
  <circle cx="400" cy="200" r="60" fill="#1B2F1B" stroke="#2d8a4e" stroke-width="2" opacity="0.8"/>
  <text x="400" y="190" font-family="'Playfair Display', Georgia, serif" font-size="28" fill="#e8f5e9" text-anchor="middle" letter-spacing="0.5" font-weight="bold">Proto</text>
  <text x="400" y="220" font-family="'Playfair Display', Georgia, serif" font-size="28" fill="#4caf50" text-anchor="middle" letter-spacing="0.5" font-weight="bold">Ville</text>
  <!-- Tagline -->
  <text x="400" y="300" font-family="'Inter', 'Helvetica', sans-serif" font-size="14" fill="#a5d6a7" text-anchor="middle" letter-spacing="3" text-transform="uppercase">PROTOTYPING RURAL FUTURES</text>
  <text x="400" y="330" font-family="'Inter', 'Helvetica', sans-serif" font-size="12" fill="#66bb6a" text-anchor="middle" letter-spacing="1" opacity="0.7">Popup Village Experience</text>
  <!-- Bottom info -->
  <text x="400" y="420" font-family="'Inter', 'Helvetica', sans-serif" font-size="11" fill="#81c784" text-anchor="middle" letter-spacing="2" opacity="0.6">APRIL 2-8, 2026 | NAMHAE, SOUTH KOREA</text>
</svg>